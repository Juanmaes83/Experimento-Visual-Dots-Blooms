        *, *::before, *::after {

            height: 100vh;

        canvas {
            touch-action: none;
            display: block;
        }
        #controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 9999;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background: rgba(0,0,0,0.5);
            padding: 12px 16px;
            border-radius: 30px;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            align-items: center;
        }
        #controls label {
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #controls input[type="color"] {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid #fff;
            cursor: pointer;
            background: transparent;
            padding: 0;
        }
        #controls input[type="file"] {
            display: none;
        }
        #controls button {
            background: rgba(255,255,255,0.2);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #controls button:hover {
            background: rgba(255,255,255,0.4);
